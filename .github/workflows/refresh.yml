name: Refresh Classroom Data

on:
  schedule:
    # 每天北京时间 7:00 (UTC 23:00)
    - cron: '0 23 * * *'
    # 白天每2小时更新一次 (北京时间 9:00-23:00, UTC 1:00-15:00)
    - cron: '0 1,3,5,7,9,11,13,15 * * *'
  workflow_dispatch:
    # 允许手动触发（前端"刷新"按钮可以触发）

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Fetch classroom data
        env:
          JW_USERNAME: ${{ secrets.JW_USERNAME }}
          JW_PASSWORD: ${{ secrets.JW_PASSWORD }}
          CONFIG_PATH: config
          GOPROXY: https://goproxy.cn,direct
        run: |
          go run cmd/fetcher/main.go
          echo "Data fetch complete"
          ls -la frontend/public/data.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          pnpm install

      - name: Build frontend
        run: |
          cd frontend
          pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=emptyclassroom

      - name: Commit updated data (as backup)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data.json
          git diff --staged --quiet || (
            git commit -m "📊 Auto-refresh classroom data [skip ci]"
            git push
          )
