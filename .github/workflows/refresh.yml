name: Refresh Classroom Data

on:
  schedule:
    # 北京时间 00:00 / 02:00 / 04:00 / 06:00 / 07:00
    # 凌晨多轮尝试，每次失败会 45s 间隔无限重试直到拉到数据
    # 一旦某轮拿到当天数据，后续所有轮次自动跳过
    - cron: '0 16,18,20,22,23 * * *'
  workflow_dispatch:

# 同一时间只允许一个刷新任务在跑
# 如果 2 点 cron 触发时 0 点的还在重试 → 直接杀掉 0 点的，让 2 点的接棒
concurrency:
  group: classroom-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ============================================================
      # 0. 计算北京时间日期
      # ============================================================
      - name: Get Beijing date
        id: date
        run: echo "beijing_date=$(TZ='Asia/Shanghai' date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      # ============================================================
      # 1. 检查今天是否已拿到新鲜数据
      #    如果已有 → 跳过所有后续步骤
      # ============================================================
      - name: Check if fresh data already exists for today
        id: fresh
        uses: actions/cache/restore@v4
        with:
          path: .fresh-today
          key: classroom-fresh-${{ steps.date.outputs.beijing_date }}

      - name: Skip (already fresh today)
        if: steps.fresh.outputs.cache-hit == 'true'
        run: |
          echo "=== $(TZ='Asia/Shanghai' date): 今日新鲜数据已获取，跳过刷新 ==="

      # ============================================================
      # 2. 拉取数据（仅当今日未拿到新鲜数据时执行）
      # ============================================================
      - name: Checkout
        if: steps.fresh.outputs.cache-hit != 'true'
        uses: actions/checkout@v4

      # 恢复上次成功拉取的数据，用于 API 挂了时做降级兜底
      # 先匹配今天的 key，没有则回退到最近一次成功的数据
      - name: Restore last known data
        if: steps.fresh.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v4
        with:
          path: frontend/public/data.json
          key: classroom-data-${{ steps.date.outputs.beijing_date }}
          restore-keys: |
            classroom-data-

      - name: Setup pnpm
        if: steps.fresh.outputs.cache-hit != 'true'
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Setup Node.js
        if: steps.fresh.outputs.cache-hit != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Fetch classroom data
        id: fetch
        if: steps.fresh.outputs.cache-hit != 'true'
        env:
          JW_USERNAME: ${{ secrets.JW_USERNAME }}
          JW_PASSWORD: ${{ secrets.JW_PASSWORD }}
        run: node script/fetch.mjs

      - name: Install frontend dependencies
        if: steps.fresh.outputs.cache-hit != 'true'
        run: |
          cd frontend
          pnpm install

      - name: Build frontend
        if: steps.fresh.outputs.cache-hit != 'true'
        run: |
          cd frontend
          pnpm build

      - name: Deploy to Cloudflare Pages
        if: steps.fresh.outputs.cache-hit != 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=emptyclassroom

      # ============================================================
      # 3. 标记"今日已获取新鲜数据"
      #    写入标记文件 + 缓存，阻止今天后续的重复刷新
      # ============================================================
      - name: Write fresh-today marker
        if: steps.fresh.outputs.cache-hit != 'true' && steps.fetch.outputs.data_fresh == 'true'
        run: |
          echo "${{ steps.date.outputs.beijing_date }} fresh" > .fresh-today
          echo "=== 标记今日数据已更新，后续 cron 将跳过 ==="

      - name: Save freshness cache
        if: steps.fresh.outputs.cache-hit != 'true' && steps.fetch.outputs.data_fresh == 'true'
        uses: actions/cache/save@v4
        with:
          path: .fresh-today
          key: classroom-fresh-${{ steps.date.outputs.beijing_date }}

      # 持久化本次拉到的 data.json（即使数据是旧的也比空壳强）
      # 下次 checkout 如果没有 data.json，会从这里恢复到 frontend/public/
      - name: Save data cache
        if: steps.fresh.outputs.cache-hit != 'true' && steps.fetch.outputs.data_fresh == 'true'
        uses: actions/cache/save@v4
        with:
          path: frontend/public/data.json
          key: classroom-data-${{ steps.date.outputs.beijing_date }}

      # ============================================================
      # 4. 总结
      # ============================================================
      - name: Summary
        if: always()
        run: |
          echo "=============================="
          echo "  Beijing Date : ${{ steps.date.outputs.beijing_date }}"
          echo "  Cache Hit    : ${{ steps.fresh.outputs.cache-hit || 'false' }}"
          echo "  Data Fresh   : ${{ steps.fetch.outputs.data_fresh || 'N/A' }}"
          echo "  Data Date    : ${{ steps.fetch.outputs.data_date || 'N/A' }}"
          echo "=============================="
