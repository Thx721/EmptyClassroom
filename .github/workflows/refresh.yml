name: Refresh Classroom Data

on:
  schedule:
    # 每天北京时间 7:00 (UTC 23:00)
    - cron: '0 23 * * *'
    # 白天每2小时更新一次 (9:00-23:00 CST)
    - cron: '0 1,3,5,7,9,11,13,15 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Fetch classroom data
        env:
          JW_USERNAME: ${{ secrets.JW_USERNAME }}
          JW_PASSWORD: ${{ secrets.JW_PASSWORD }}
          CONFIG_PATH: config
          GO111MODULE: on
          GOPROXY: https://proxy.golang.org,direct
        run: |
          go mod download
          go run ./cmd/fetcher/
          echo "Data fetch complete"
          ls -la frontend/public/data.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          pnpm install

      - name: Build frontend
        run: |
          cd frontend
          pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=emptyclassroom
